<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoshiBot v2 - Pixel Edition</title>
    <!-- React & Babel for standalone execution -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --yoshi-green: #88D058;
            --yoshi-dark: #4A9031;
            --yoshi-red: #E4000F;
            --yoshi-yellow: #F8D800;
        }

        body {
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            margin: 0;
            overflow: hidden;
            image-rendering: pixelated;
        }

        .pixel-border {
            box-shadow: 
                0 -4px 0 0 black,
                0 4px 0 0 black,
                -4px 0 0 0 black,
                4px 0 0 0 black;
        }

        .pixel-border-white {
            box-shadow: 
                0 -4px 0 0 white,
                0 4px 0 0 white,
                -4px 0 0 0 white,
                4px 0 0 0 white;
        }

        .pixel-shadow {
            box-shadow: 8px 8px 0 0 rgba(0, 0, 0, 0.2);
        }

        .pixel-button {
            position: relative;
            display: inline-block;
            padding: 0.5rem 1rem;
            background: var(--yoshi-green);
            color: black;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.1s;
            box-shadow: 0 4px 0 0 var(--yoshi-dark);
            border: none;
            cursor: pointer;
        }

        .pixel-button:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 0px 0 0 var(--yoshi-dark);
        }

        .pixel-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pixel-button-msg {
            position: relative;
            padding: 1rem;
            transition: all 0.1s;
            border: 4px solid black;
        }

        .pixel-button-msg::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255,255,255,0.3);
            pointer-events: none;
        }

        .pixel-box {
            background: white;
            border: 4px solid black;
            padding: 1rem;
            position: relative;
        }

        .pixel-box::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid white;
            pointer-events: none;
        }

        /* Theme Specific Backgrounds */
        .bg-yoshi-island { 
            background-color: #5C94FC;
            background-image: 
                linear-gradient(45deg, #88D058 25%, transparent 25%),
                linear-gradient(-45deg, #88D058 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #88D058 75%),
                linear-gradient(-45deg, transparent 75%, #88D058 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px 20px, 20px 0;
        }

        .bg-mario-galaxy { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
        }

        .bg-luigi-mansion { 
            background: linear-gradient(180deg, #1a1a1a 0%, #2d3436 100%);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 12px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: black;
            border: 3px solid transparent;
            background-clip: content-box;
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }

        @keyframes spooky-flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.8; }
        }
        .spooky-flicker {
            animation: spooky-flicker 4s infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Icons (Lucide replacement for standalone) ---
        const Icon = ({ name, className, ...props }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const icon = window.lucide.icons[name];
                        if (icon) {
                            // Use Lucide's toSVG with attributes
                            setSvg(icon.toSVG({ 
                                class: className || '',
                                width: 24,
                                height: 24
                            }));
                        }
                    }
                };
                renderIcon();
                // Retry if lucide isn't loaded yet
                if (!window.lucide) {
                    const interval = setInterval(() => {
                        if (window.lucide) {
                            renderIcon();
                            clearInterval(interval);
                        }
                    }, 100);
                    return () => clearInterval(interval);
                }
            }, [name, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} {...props} />;
        };

        // --- Constants ---
        const API_KEY = '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';
        const MODEL_ID = 'qwen/qwen3.6-plus:free';
        const YOSHI_PFP = 'https://cdn.phototourl.com/free/2026-04-04-5ecd72c3-eb52-49fc-b471-44176b4d2384.png';

        const THEME_CONFIG = {
            'yoshi-island': {
                bg: 'bg-yoshi-island',
                sidebar: 'bg-[#DCEDC1]',
                header: 'bg-[#88D058]',
                accent: 'text-[#E4000F]',
                text: 'text-black',
                box: 'bg-white',
                userMsg: 'bg-[#F8D800] text-black',
                botMsg: 'bg-white text-black',
                icon: 'Star'
            },
            'mario-galaxy': {
                bg: 'bg-mario-galaxy',
                sidebar: 'bg-[#1A1A40]',
                header: 'bg-[#4B0082]',
                accent: 'text-yellow-400',
                text: 'text-black',
                box: 'bg-[#2D2D5A]',
                userMsg: 'bg-[#FFD700] text-black',
                botMsg: 'bg-white text-black',
                icon: 'Sparkles'
            },
            'luigi-mansion': {
                bg: 'bg-luigi-mansion',
                sidebar: 'bg-[#2D3436]',
                header: 'bg-[#4B5320]',
                accent: 'text-purple-500',
                text: 'text-black',
                box: 'bg-[#353B48]',
                userMsg: 'bg-[#88D058] text-black',
                botMsg: 'bg-white text-black',
                icon: 'Ghost'
            }
        };

        // --- Safety Wrappers for Sandboxed Environments ---
        const getSafeLocation = () => {
            try { return window.location.href; } catch (e) { return "https://yoshibot.v2"; }
        };

        function App() {
            const [sessions, setSessions] = useState([]);
            const [currentSessionId, setCurrentSessionId] = useState(null);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [selectedImage, setSelectedImage] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [theme, setTheme] = useState('yoshi-island');
            const [isNamingSession, setIsNamingSession] = useState(false);
            const [newSessionName, setNewSessionName] = useState('');
            const [coins, setCoins] = useState(0);
            const [rateLimitWait, setRateLimitWait] = useState(0);

            const chatEndRef = useRef(null);
            const fileInputRef = useRef(null);

            const activeTheme = THEME_CONFIG[theme];
            const currentSession = sessions.find(s => s.id === currentSessionId);

            useEffect(() => {
                try {
                    const savedSessions = localStorage.getItem('yoshibot_pixel_sessions_v3');
                    if (savedSessions) {
                        const parsed = JSON.parse(savedSessions);
                        setSessions(parsed);
                        if (parsed.length > 0) setCurrentSessionId(parsed[0].id);
                    }
                    const savedCoins = localStorage.getItem('yoshibot_coins');
                    if (savedCoins) setCoins(parseInt(savedCoins));
                    const savedTheme = localStorage.getItem('yoshibot_theme_v3');
                    if (savedTheme) setTheme(savedTheme);
                } catch (e) {
                    console.error("Storage Error:", e);
                }
            }, []);

            useEffect(() => { localStorage.setItem('yoshibot_pixel_sessions_v3', JSON.stringify(sessions)); }, [sessions]);
            useEffect(() => { localStorage.setItem('yoshibot_coins', coins.toString()); }, [coins]);
            useEffect(() => { localStorage.setItem('yoshibot_theme_v3', theme); }, [theme]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [sessions, currentSessionId]);

            useEffect(() => {
                if (rateLimitWait > 0) {
                    const timer = setTimeout(() => setRateLimitWait(rateLimitWait - 1), 1000);
                    return () => clearTimeout(timer);
                }
            }, [rateLimitWait]);

            const createNewSession = () => {
                setNewSessionName('');
                setIsNamingSession(true);
            };

            const confirmNewSession = () => {
                const newSession = {
                    id: Date.now().toString(),
                    name: newSessionName || `WORLD ${sessions.length + 1}-1`,
                    messages: [],
                    createdAt: Date.now()
                };
                setSessions([newSession, ...sessions]);
                setCurrentSessionId(newSession.id);
                setIsNamingSession(false);
                setCoins(prev => prev + 10);
            };

            const deleteSession = (id, e) => {
                e.stopPropagation();
                const updated = sessions.filter(s => s.id !== id);
                setSessions(updated);
                if (currentSessionId === id) {
                    setCurrentSessionId(updated.length > 0 ? updated[0].id : null);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setSelectedImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const sendMessage = async () => {
                if ((!input.trim() && !selectedImage) || isLoading || rateLimitWait > 0 || !currentSessionId) return;

                const userMsg = {
                    role: 'user',
                    content: input,
                    image: selectedImage,
                    timestamp: Date.now()
                };

                const updatedSessions = sessions.map(s => {
                    if (s.id === currentSessionId) {
                        return { ...s, messages: [...s.messages, userMsg] };
                    }
                    return s;
                });

                setSessions(updatedSessions);
                setInput('');
                setSelectedImage(null);
                setIsLoading(true);
                setCoins(prev => prev + 10);

                try {
                    const currentSession = updatedSessions.find(s => s.id === currentSessionId);
                    if (!currentSession) return;

                    // Construct history exactly like the snippet
                    const chatHistory = currentSession.messages.map(m => {
                        if (m.role === 'assistant') {
                            return { role: 'assistant', content: m.content };
                        }
                        
                        const payloadContent = [];
                        if (m.content) payloadContent.push({ type: "text", text: m.content });
                        if (m.image) {
                            payloadContent.push({
                                type: "image_url",
                                image_url: { url: m.image }
                            });
                        }
                        return { role: "user", content: payloadContent };
                    });

                    // User's snippet sends the full history (up to 20)
                    const messagesForApi = chatHistory.length > 20 ? chatHistory.slice(-20) : chatHistory;

                    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${API_KEY}`,
                            "Content-Type": "application/json",
                            "HTTP-Referer": getSafeLocation(),
                            "X-Title": "YoshiBot"
                        },
                        body: JSON.stringify({
                            model: MODEL_ID,
                            messages: messagesForApi
                        })
                    });

                    if (response.status === 429) {
                        setRateLimitWait(60);
                        throw new Error('Rate limit hit');
                    }

                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error?.message || `API Error: ${response.status}`);
                    }

                    if (data.choices && data.choices[0]) {
                        const botReply = data.choices[0].message.content;

                        const finalSessions = updatedSessions.map(s => {
                            if (s.id === currentSessionId) {
                                let newMessages = [...s.messages, { role: 'assistant', content: botReply, timestamp: Date.now() }];
                                
                                // Cleanup history if too long (matching user's 20 message logic)
                                if (newMessages.length > 20) {
                                    newMessages = newMessages.slice(-20);
                                }
                                
                                return { ...s, messages: newMessages };
                            }
                            return s;
                        });
                        setSessions(finalSessions);
                    }
                } catch (error) {
                    console.error('AI Error:', error);
                    const finalSessions = updatedSessions.map(s => {
                        if (s.id === currentSessionId) {
                            return { 
                                ...s, 
                                messages: [...s.messages, { role: 'assistant', content: `Mamma Mia! Error: ${error.message}`, timestamp: Date.now() }] 
                            };
                        }
                        return s;
                    });
                    setSessions(finalSessions);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className={`flex h-screen w-full overflow-hidden ${activeTheme.bg} font-mono text-xl ${activeTheme.text}`}>
                    
                    {/* Background Decor */}
                    <div className="absolute inset-0 pointer-events-none opacity-20 overflow-hidden">
                        {theme === 'yoshi-island' && (
                            <React.Fragment>
                                <div className="absolute top-20 left-20 w-40 h-20 bg-white pixel-border" />
                                <div className="absolute bottom-20 right-1/4 w-48 h-24 bg-[#88D058] pixel-border" />
                            </React.Fragment>
                        )}
                        {theme === 'mario-galaxy' && (
                            <React.Fragment>
                                <div className="absolute top-1/4 left-1/3 w-4 h-4 bg-yellow-400 pixel-border animate-pulse" />
                                <div className="absolute top-1/2 right-1/4 w-6 h-6 bg-purple-400 pixel-border animate-bounce" />
                                <div className="absolute bottom-1/4 left-1/2 w-3 h-3 bg-white pixel-border" />
                            </React.Fragment>
                        )}
                        {theme === 'luigi-mansion' && (
                            <React.Fragment>
                                <div className="absolute top-10 right-10 w-20 h-20 bg-zinc-800 pixel-border spooky-flicker" />
                                <div className="absolute bottom-40 left-10 w-10 h-10 bg-purple-900/40 pixel-border" />
                            </React.Fragment>
                        )}
                    </div>

                    {/* Sidebar */}
                    <AnimatePresence>
                        {isSidebarOpen && (
                            <motion.aside 
                                initial={{ x: -320 }}
                                animate={{ x: 0 }}
                                exit={{ x: -320 }}
                                className={`w-80 h-full flex flex-col ${activeTheme.sidebar} border-r-8 border-black z-30 relative`}
                            >
                                <div className={`p-6 border-b-8 border-black ${activeTheme.header}`}>
                                    <div className="flex items-center gap-4 mb-4">
                                        <div className="w-12 h-12 bg-white pixel-border flex items-center justify-center">
                                            <Icon name="Gamepad2" className="w-8 h-8 text-[#E4000F]" />
                                        </div>
                                        <h1 className="font-pixel text-[10px] leading-tight text-black" style={{ fontFamily: "'Press Start 2P', cursive" }}>YoshiBot<br/>v2 {theme.split('-')[1]?.toUpperCase() || 'ISLAND'}</h1>
                                    </div>
                                    <div className="flex items-center gap-2 bg-black/10 p-2 pixel-border-white">
                                        <Icon name="Coins" className="w-5 h-5 text-[#F8D800]" />
                                        <span className="font-pixel text-[10px] text-black" style={{ fontFamily: "'Press Start 2P', cursive" }}>{coins.toString().padStart(6, '0')}</span>
                                    </div>
                                </div>

                                <div className="p-4">
                                    <button 
                                        onClick={createNewSession}
                                        className="pixel-button w-full flex items-center justify-center gap-2"
                                    >
                                        <Icon name="Plus" className="w-4 h-4" />
                                        <span>New Level</span>
                                    </button>
                                </div>

                                <div className="flex-1 overflow-y-auto px-4 space-y-4 custom-scrollbar pb-6">
                                    {sessions.map(session => (
                                        <div 
                                            key={session.id}
                                            onClick={() => setCurrentSessionId(session.id)}
                                            className={`pixel-box cursor-pointer transition-all hover:translate-x-1 ${
                                                currentSessionId === session.id 
                                                    ? 'bg-[#F8D800] border-[#E4000F]' 
                                                    : `${activeTheme.box} hover:opacity-80`
                                            }`}
                                        >
                                            <div className="flex items-center gap-3">
                                                <Icon name={activeTheme.icon} className={`w-4 h-4 ${currentSessionId === session.id ? 'text-[#E4000F] fill-[#E4000F]' : 'text-black/20'}`} />
                                                <span className={`truncate text-lg font-bold flex-1 ${currentSessionId === session.id ? 'text-black' : activeTheme.text}`}>
                                                    {session.name}
                                                </span>
                                                <button 
                                                    onClick={(e) => deleteSession(session.id, e)}
                                                    className="p-1 hover:bg-red-500/20 rounded transition-all"
                                                >
                                                    <Icon name="Trash2" className="w-4 h-4 text-[#E4000F]" />
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="p-4 bg-black/20 flex flex-wrap gap-2 justify-center">
                                    {Object.keys(THEME_CONFIG).map(t => (
                                        <button 
                                            key={t}
                                            onClick={() => setTheme(t)}
                                            className={`w-8 h-8 pixel-border transition-all hover:scale-110 ${
                                                theme === t ? 'border-white scale-125' : 'border-black opacity-60'
                                            } ${
                                                t === 'yoshi-island' ? 'bg-[#88D058]' : t === 'mario-galaxy' ? 'bg-[#4B0082]' : 'bg-[#4B5320]'
                                            }`}
                                        />
                                    ))}
                                </div>
                            </motion.aside>
                        )}
                    </AnimatePresence>

                    {/* Main Chat Area */}
                    <main className="flex-1 flex flex-col relative z-10">
                        <header className={`h-20 flex items-center justify-between px-8 ${activeTheme.header} border-b-8 border-black`}>
                            <div className="flex items-center gap-6">
                                {!isSidebarOpen && (
                                    <button onClick={() => setIsSidebarOpen(true)} className="pixel-box p-2 bg-white hover:bg-[#F8F8F8]">
                                        <Icon name="Menu" className="w-6 h-6 text-black" />
                                    </button>
                                )}
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 pixel-border bg-white overflow-hidden">
                                        <img src={YOSHI_PFP} alt="Yoshi" className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                                    </div>
                                    <div>
                                        <h2 className="font-pixel text-[8px] text-black" style={{ fontFamily: "'Press Start 2P', cursive" }}>
                                            {currentSession?.name || 'WORLD 1-1'}
                                        </h2>
                                        <div className="flex items-center gap-2 mt-1">
                                            <div className="flex gap-1">
                                                {[1,2,3].map(i => <Icon key={i} name="Heart" className="w-3 h-3 text-[#E4000F] fill-[#E4000F]" />)}
                                            </div>
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-black/60">Active</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 space-y-8 custom-scrollbar">
                            {currentSession?.messages.length === 0 && (
                                <div className="h-full flex flex-col items-center justify-center text-center px-6">
                                    <div className={`pixel-box ${activeTheme.box} max-w-lg pixel-shadow`}>
                                        <Icon name={activeTheme.icon} className="w-12 h-12 mx-auto mb-4 text-[#F8D800] fill-[#F8D800] animate-spin-slow" />
                                        <h3 className={`font-pixel text-[10px] mb-4 ${activeTheme.text}`} style={{ fontFamily: "'Press Start 2P', cursive" }}>PRESS START TO CHAT</h3>
                                        <p className={`text-xl ${activeTheme.text}`}>
                                            Welcome to the {theme.replace('-', ' ')} Level! Type a message below to start your adventure.
                                        </p>
                                    </div>
                                </div>
                            )}

                            {currentSession?.messages.map((msg, idx) => (
                                <motion.div 
                                    key={idx}
                                    initial={{ opacity: 0, x: msg.role === 'user' ? 20 : -20 }}
                                    animate={{ opacity: 1, x: 0 }}
                                    className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}
                                >
                                    <div className={`max-w-[85%] flex gap-4 ${msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                        <div className="w-12 h-12 pixel-border bg-white shrink-0 flex items-center justify-center overflow-hidden">
                                            {msg.role === 'user' ? (
                                                <div className="w-full h-full bg-[#F8D800] flex items-center justify-center font-pixel text-lg text-black" style={{ fontFamily: "'Press Start 2P', cursive" }}>P1</div>
                                            ) : (
                                                <img src={YOSHI_PFP} alt="Y" className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                                            )}
                                        </div>
                                        <div className={`pixel-button-msg pixel-shadow ${
                                            msg.role === 'user' 
                                                ? 'bg-[#88D058] border-[#4A9031] text-black' 
                                                : `${activeTheme.botMsg} border-black`
                                        }`} style={{ 
                                            boxShadow: msg.role === 'user' ? '0 6px 0 0 #4A9031' : '0 6px 0 0 rgba(0,0,0,0.2)' 
                                        }}>
                                            {msg.image && (
                                                <div className="pixel-border mb-4 overflow-hidden">
                                                    <img src={msg.image} alt="Uploaded" className="max-w-full" referrerPolicy="no-referrer" />
                                                </div>
                                            )}
                                            <p className={`text-2xl leading-tight whitespace-pre-wrap text-black`}>
                                                {msg.content}
                                            </p>
                                            <div className="mt-4 flex items-center justify-between opacity-40 text-[10px] font-bold uppercase text-black">
                                                <span>{msg.role === 'user' ? 'PLAYER 1' : 'YOSHIBOT'}</span>
                                                <span>{new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                            </div>
                                        </div>
                                    </div>
                                </motion.div>
                            ))}
                            
                            {isLoading && (
                                <div className="flex justify-start">
                                    <div className="flex gap-4">
                                        <div className="w-12 h-12 pixel-border bg-white flex items-center justify-center">
                                            <Icon name="Loader2" className="w-6 h-6 text-[#88D058] animate-spin" />
                                        </div>
                                        <div className={`pixel-box ${activeTheme.box}`}>
                                            <div className="flex gap-2">
                                                <div className="w-3 h-3 bg-[#88D058] animate-bounce" />
                                                <div className="w-3 h-3 bg-[#88D058] animate-bounce [animation-delay:0.2s]" />
                                                <div className="w-3 h-3 bg-[#88D058] animate-bounce [animation-delay:0.4s]" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        <div className={`p-8 ${activeTheme.bg} border-t-8 border-black relative`}>
                            {rateLimitWait > 0 && (
                                <div className="absolute bottom-full left-0 right-0 p-4 bg-[#E4000F] text-white font-pixel text-[10px] text-center border-t-8 border-black animate-pulse" style={{ fontFamily: "'Press Start 2P', cursive" }}>
                                    <Icon name="AlertTriangle" className="inline-block w-4 h-4 mr-2" />
                                    Whoa! Yoshi is exhausted. Please wait {rateLimitWait}s so we don't bankrupt my developer Tristain!
                                </div>
                            )}

                            <div className="max-w-5xl mx-auto flex gap-4 items-end">
                                <div className={`flex-1 pixel-box ${activeTheme.box} flex flex-col gap-2`}>
                                    {selectedImage && (
                                        <div className="relative inline-block w-20 h-20 pixel-border mb-2">
                                            <img src={selectedImage} alt="Preview" className="w-full h-full object-cover" />
                                            <button 
                                                onClick={() => setSelectedImage(null)}
                                                className="absolute -top-2 -right-2 w-6 h-6 bg-[#E4000F] text-white pixel-border flex items-center justify-center"
                                            >
                                                <Icon name="X" className="w-4 h-4" />
                                            </button>
                                        </div>
                                    )}
                                    <div className="flex items-center gap-4">
                                        <button 
                                            onClick={() => fileInputRef.current?.click()}
                                            disabled={rateLimitWait > 0}
                                            className="p-2 hover:bg-black/10 transition-colors"
                                        >
                                            <Icon name="Image" className={`w-8 h-8 text-black`} />
                                        </button>
                                        <input type="file" ref={fileInputRef} onChange={handleImageUpload} accept="image/*" className="hidden" />
                                        <textarea 
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            onKeyDown={(e) => {
                                                if (e.key === 'Enter' && !e.shiftKey) {
                                                    e.preventDefault();
                                                    sendMessage();
                                                }
                                            }}
                                            disabled={rateLimitWait > 0}
                                            placeholder="Type your command..."
                                            className={`flex-1 bg-transparent border-none focus:ring-0 resize-none py-2 text-2xl min-h-[44px] max-h-40 outline-none ${activeTheme.text}`}
                                        />
                                    </div>
                                </div>
                                
                                <button 
                                    onClick={sendMessage}
                                    disabled={(!input.trim() && !selectedImage) || isLoading || rateLimitWait > 0 || !currentSessionId}
                                    className="pixel-button h-16 px-8 flex items-center justify-center"
                                >
                                    <Icon name="Send" className="w-6 h-6" />
                                </button>
                            </div>
                        </div>

                        <AnimatePresence>
                            {isNamingSession && (
                                <motion.div 
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    exit={{ opacity: 0 }}
                                    className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm"
                                >
                                    <motion.div 
                                        initial={{ scale: 0.8, y: 40 }}
                                        animate={{ scale: 1, y: 0 }}
                                        className={`pixel-box ${activeTheme.box} w-full max-w-lg p-10 pixel-shadow`}
                                    >
                                        <h3 className={`font-pixel text-[10px] mb-6 text-center text-black`} style={{ fontFamily: "'Press Start 2P', cursive" }}>NAME YOUR LEVEL</h3>
                                        <input 
                                            autoFocus
                                            type="text"
                                            value={newSessionName}
                                            onChange={(e) => setNewSessionName(e.target.value)}
                                            onKeyDown={(e) => e.key === 'Enter' && confirmNewSession()}
                                            placeholder="WORLD 1-1"
                                            className={`w-full p-4 pixel-border bg-white outline-none mb-8 text-2xl text-center text-black`}
                                        />
                                        <div className="flex gap-6">
                                            <button onClick={() => setIsNamingSession(false)} className="pixel-button flex-1 bg-[#E4000F] border-red-900" style={{ boxShadow: '0 4px 0 0 #991b1b' }}>CANCEL</button>
                                            <button onClick={confirmNewSession} disabled={!newSessionName.trim()} className="pixel-button flex-1 disabled:opacity-50">START</button>
                                        </div>
                                    </motion.div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
